# =============================================================================
# Portfolio Optimization — Database Configuration
# =============================================================================

# --- H2 embedded (default) ---------------------------------------------------
# Zero-install, file-based database stored in data/portfoliodb.mv.db
# MySQL compatibility mode handles the existing DDL and upsert syntax.
db.driver=org.h2.Driver
db.url=jdbc:h2:./data/portfoliodb;MODE=MySQL
db.user=sa
db.password=
db.name=PUBLIC

# --- MariaDB / MySQL (production) --------------------------------------------
# Uncomment and comment out the H2 block above to switch to MariaDB.
#db.driver=org.mariadb.jdbc.Driver
#db.url=jdbc:mariadb://192.168.1.151/bcfinancial
#db.user=dbuser
#db.password=dbuser
#db.name=bcfinancial

# Connection pool size (used by PersistenceManagerImpl; DataSourceFactory opens
# fresh connections per call — Phase 3 will add HikariCP here).
db.pool.size=8

# =============================================================================
# Optimization defaults
# =============================================================================
optimization.default.time.period.days=90
optimization.default.duration.years=1

# =============================================================================
# Equity loader
# =============================================================================
# Rolling lookback window for nightly updates (days).
# Override on the CLI with --days=N or use --full for a 5-year history load.
equity.loader.default.lookback.days=30
